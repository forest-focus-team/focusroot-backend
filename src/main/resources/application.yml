spring:
  profiles:
    active: dev

  datasource:
    url: jdbc:mysql://localhost:3306/focusroot_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    # Mật khẩu MySQL local (container docker-compose). Giữ default `focusroot123` để
    # onboarding 1 lệnh (`docker-compose up -d mysql` + `mvn spring-boot:run`); BẮT BUỘC
    # override qua biến môi trường DB_PASSWORD khi triển khai thật. Xem .env.example.
    password: ${DB_PASSWORD:focusroot123}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    # Bật OSIV để serialize được quan hệ LAZY khi controller trả entity JPA
    # (SessionController/ForestController trả FocusSession/MyForest có user/treeSpecies LAZY).
    # Với false → tx đóng trước khi Jackson serialize → LazyInitializationException → HTTP 500.
    # An toàn ở đây: quan hệ 1 chiều (không đệ quy) + User.passwordHash đã @JsonIgnore.
    # Backlog Tuần 6: chuyển sang trả DTO phẳng để tắt lại OSIV. Guard: EntitySerializationIntegrationTest.
    open-in-view: true

  jackson:
    time-zone: UTC
    date-format: yyyy-MM-dd'T'HH:mm:ss'Z'

server:
  port: 8080
  servlet:
    context-path: /api

app:
  jwt:
    # BẮT BUỘC set qua biến môi trường JWT_SECRET (tối thiểu 32 ký tự) — KHÔNG có default.
    # Đây là khoá ký HMAC cho toàn bộ access/refresh token: một giá trị mặc định đoán được
    # cho phép giả mạo token. Thiếu JWT_SECRET -> app fail-fast ngay khi khởi động
    # ("Could not resolve placeholder 'JWT_SECRET'"). Xem .env.example. (profile test dùng
    # secret riêng trong application-test.yml).
    secret: ${JWT_SECRET}
    expiration-ms: 86400000        # 24 hours
    refresh-expiration-ms: 604800000  # 7 days

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

logging:
  level:
    com.focusroot: DEBUG
    org.springframework.security: INFO
