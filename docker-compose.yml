services:
  mysql:
    image: mysql:8.0
    container_name: focusroot-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: focusroot123
      MYSQL_DATABASE: focusroot_db
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pfocusroot123"]
      interval: 10s
      timeout: 5s
      retries: 5

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: focusroot-phpmyadmin
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: focusroot123
    ports:
      - "8081:80"

  # Backend Spring Boot — build từ Dockerfile multi-stage.
  # Chạy cả stack: `JWT_SECRET=... docker-compose up --build` (hoặc set trong .env).
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: focusroot-app
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      # Trong container phải trỏ tới service `mysql`, không phải localhost.
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/focusroot_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      DB_PASSWORD: ${DB_PASSWORD:-focusroot123}
      # BẮT BUỘC: set JWT_SECRET (>=32 ký tự) trong .env hoặc môi trường trước khi chạy `app`.
      # Bỏ trống -> app fail-fast khi khởi động (không phá lệnh `up -d mysql` vốn không cần biến này).
      JWT_SECRET: ${JWT_SECRET:-}
    ports:
      - "8080:8080"

volumes:
  mysql_data:
    driver: local
